name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # 新增的手动触发器

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. 拉取当前后端 Float 仓库代码
      - name: Checkout Backend
        uses: actions/checkout@v4
        with:
          path: backend

      # 2. 拉取前端 Float-web 仓库代码
      - name: Checkout Frontend
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Float-web
          path: frontend

      # 3. 配置 Node.js 并编译前端静态资源
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          rm -rf ../backend/dist
          mv dist ../backend/

      # 4. 配置 Go 并编译后端二进制文件
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # 需确保与你 go.mod 中的版本一致

      - name: Build Backend
        run: |
          cd backend
          # 编译出名为 Float 的可执行文件
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o Float ./cmd/server/main.go 

      # 5. 登录容器仓库
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6. 生成版本标签
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      # 7. 执行 Docker 构建并推送
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # 上下文指向 backend 目录，此时该目录下已具备 Float 和 dist
          context: ./backend 
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}